<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WavePlay — a mini music player powered by the Deezer API">
  <title>WavePlay | Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">♫</span>
        <h1>WavePlay</h1>
      </div>
      <p class="tagline">Discover &amp; preview tracks via Deezer</p>
    </header>

    <section class="search-section" aria-label="Search music">
      <form id="search-form" class="search-form" role="search">
        <label for="search-input" class="visually-hidden">Search for songs, artists, or albums</label>
        <input
          type="search"
          id="search-input"
          placeholder="Search songs, artists, albums…"
          autocomplete="off"
          required
        >
        <button type="submit" id="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/>
            <path d="M20 20l-3-3"/>
          </svg>
        </button>
      </form>
    </section>

    <main class="main">
      <div class="panel tracks-panel">
        <div class="panel-header">
          <h2 id="tracks-heading">Trending Tracks</h2>
          <span id="track-count" class="track-count"></span>
        </div>
        <div id="loading" class="loading" hidden>
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading tracks…</span>
        </div>
        <p id="error-message" class="error-message" hidden role="alert"></p>
        <ul id="track-list" class="track-list" role="listbox" aria-label="Track list"></ul>
      </div>

      <aside class="panel player-panel" aria-label="Now playing">
        <div class="now-playing">
          <div class="album-art-wrap">
            <img id="album-art" src="" alt="" class="album-art">
            <div id="album-art-placeholder" class="album-art-placeholder" aria-hidden="true">♪</div>
          </div>
          <div class="track-info">
            <h3 id="now-playing-title">Select a track</h3>
            <p id="now-playing-artist">—</p>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div class="time-labels">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button type="button" id="prev-btn" class="control-btn" aria-label="Previous track" disabled>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
          </button>
          <button type="button" id="play-btn" class="control-btn play-btn" aria-label="Play" disabled>
            <svg id="play-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" hidden><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button type="button" id="next-btn" class="control-btn" aria-label="Next track" disabled>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6l8.5 6V6l-8.5 6z"/></svg>
          </button>
        </div>

        <div class="volume-section">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <label for="volume-slider" class="visually-hidden">Volume</label>
          <input type="range" id="volume-slider" min="0" max="100" value="80">
        </div>

        <audio id="audio-player" preload="none"></audio>
      </aside>
    </main>

    <footer class="footer">
      <p>Powered by <a href="https://developers.deezer.com/" target="_blank" rel="noopener noreferrer">Deezer API</a> · 30-second previews only</p>
    </footer>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
